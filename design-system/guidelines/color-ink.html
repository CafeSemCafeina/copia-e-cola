<!-- @dsCard group="Colors" viewport="700x150" name="Ink — Text" subtitle="Warm grays for primary, secondary, muted and placeholder text" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; gap: 3px; }
  .samp { font-weight: 600; font-size: 18px; }
  .name { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><span class="samp" style="color:var(--ink-900)">Aa</span><span class="name">ink-900 · strong</span><span class="val">#1c1b17</span></div>
    <div class="col"><span class="samp" style="color:var(--ink-700)">Aa</span><span class="name">ink-700 · body</span><span class="val">#46443c</span></div>
    <div class="col"><span class="samp" style="color:var(--ink-500)">Aa</span><span class="name">ink-500 · muted</span><span class="val">#6f6c60</span></div>
    <div class="col"><span class="samp" style="color:var(--ink-400)">Aa</span><span class="name">ink-400 · placeholder</span><span class="val">#918d7e</span></div>
    <div class="col"><span class="samp" style="color:var(--ink-300)">Aa</span><span class="name">ink-300 · faint</span><span class="val">#b6b2a5</span></div>
  </div>
</body>
</html>
