<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & Shadows" subtitle="Small crisp radii · soft low shadows on warm paper — never heavy or glowy" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-canvas); font-family: var(--font-ui); }
  .row { display: flex; gap: 28px; }
  .group { display: flex; gap: 16px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .box { width: 54px; height: 46px; background: var(--surface-card); border: 1px solid var(--border-hairline); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .div { width: 1px; background: var(--border-hairline); }
</style>
</head>
<body>
  <div class="row">
    <div class="group">
      <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="tag">xs · 4</span></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="tag">sm · 6</span></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tag">md · 8</span></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tag">lg · 12</span></div>
    </div>
    <div class="div"></div>
    <div class="group">
      <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-xs)"></div><span class="tag">xs</span></div>
      <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-sm)"></div><span class="tag">sm</span></div>
      <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-md)"></div><span class="tag">md</span></div>
      <div class="col"><div class="box" style="border:none;box-shadow:var(--shadow-lg)"></div><span class="tag">lg</span></div>
    </div>
  </div>
</body>
</html>
