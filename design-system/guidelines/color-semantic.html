<!-- @dsCard group="Colors" viewport="700x150" name="Accent & Semantic" subtitle="Amber for favorites · red for destructive · blue for global / links" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-canvas); font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--text-muted); }
  .chips { display: flex; gap: 6px; }
  .chip { flex: 1; height: 38px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.05); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="group">
      <span class="label">Amber · favoritos</span>
      <div class="chips">
        <div class="chip" style="background:var(--amber-50)"></div>
        <div class="chip" style="background:var(--amber-100)"></div>
        <div class="chip" style="background:var(--amber-400)"></div>
        <div class="chip" style="background:var(--amber-600)"></div>
      </div>
      <span class="val">400 · #e0a330</span>
    </div>
    <div class="group">
      <span class="label">Red · excluir</span>
      <div class="chips">
        <div class="chip" style="background:var(--red-50)"></div>
        <div class="chip" style="background:var(--red-100)"></div>
        <div class="chip" style="background:var(--red-500)"></div>
        <div class="chip" style="background:var(--red-600)"></div>
      </div>
      <span class="val">500 · #cf4137</span>
    </div>
    <div class="group">
      <span class="label">Blue · global / link</span>
      <div class="chips">
        <div class="chip" style="background:var(--blue-50)"></div>
        <div class="chip" style="background:var(--blue-500)"></div>
        <div class="chip" style="background:var(--blue-600)"></div>
      </div>
      <span class="val">600 · #2459ad</span>
    </div>
  </div>
</body>
</html>
