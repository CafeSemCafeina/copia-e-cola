<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid — compact density for a tool opened dozens of times a day" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--green-500); border-radius: 2px; width: 100%; }
  .box { display: flex; align-items: flex-end; height: 56px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .px { font-size: 11px; font-weight: 600; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box"><div class="bar" style="height:4px;width:14px"></div></div><span class="px">2</span><span class="tag">space-1</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:8px;width:14px"></div></div><span class="px">4</span><span class="tag">space-2</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:12px;width:16px"></div></div><span class="px">6</span><span class="tag">space-3</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:16px;width:18px"></div></div><span class="px">8</span><span class="tag">space-4</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:24px;width:20px"></div></div><span class="px">12</span><span class="tag">space-5</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:32px;width:22px"></div></div><span class="px">16</span><span class="tag">space-6</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:40px;width:24px"></div></div><span class="px">20</span><span class="tag">space-7</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:48px;width:26px"></div></div><span class="px">24</span><span class="tag">space-8</span></div>
    <div class="col"><div class="box"><div class="bar" style="height:56px;width:30px"></div></div><span class="px">32</span><span class="tag">space-10</span></div>
  </div>
</body>
</html>
