<!-- @dsCard group="Type" viewport="700x180" name="Font Families" subtitle="Hanken Grotesk for UI · IBM Plex Mono for saved content & metadata" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-ui); color: var(--text-strong); }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .block { display: flex; flex-direction: column; gap: 3px; }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
  .big-ui { font-family: var(--font-ui); font-weight: 700; font-size: 30px; letter-spacing: -0.014em; }
  .big-mono { font-family: var(--font-mono); font-weight: 500; font-size: 22px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stack">
    <div class="block">
      <span class="eyebrow">UI · Hanken Grotesk</span>
      <span class="big-ui">Salvar, copiar, organizar — rápido</span>
      <span class="meta">400 · 500 · 600 · 700 · 800</span>
    </div>
    <div class="block">
      <span class="eyebrow">Conteúdo & meta · IBM Plex Mono</span>
      <span class="big-mono">web.whatsapp.com · 14 itens</span>
      <span class="meta">400 · 500 · 600</span>
    </div>
  </div>
</body>
</html>
