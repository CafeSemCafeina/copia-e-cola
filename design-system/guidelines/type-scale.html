<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Compact scale tuned for an extension popup, with display sizes for docs" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-ui); color: var(--text-strong); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-hairline); }
  .r:last-child { border-bottom: none; }
  .tag { width: 86px; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .s { color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="tag">3xl · 36</span><span class="s" style="font-size:36px;font-weight:700;letter-spacing:-.014em">Copia e Cola</span></div>
  <div class="r"><span class="tag">2xl · 28</span><span class="s" style="font-size:28px;font-weight:700;letter-spacing:-.014em">Itens deste site</span></div>
  <div class="r"><span class="tag">xl · 22</span><span class="s" style="font-size:22px;font-weight:600">Novo item salvo</span></div>
  <div class="r"><span class="tag">lg · 18</span><span class="s" style="font-size:18px;font-weight:600">Título opcional</span></div>
  <div class="r"><span class="tag">md · 16</span><span class="s" style="font-size:16px;font-weight:500">Conteúdo do modelo</span></div>
  <div class="r"><span class="tag">base · 14</span><span class="s" style="font-size:14px;font-weight:400">Texto de interface padrão</span></div>
  <div class="r"><span class="tag">sm · 13</span><span class="s" style="font-size:13px;font-weight:400;color:var(--text-body)">Corpo do popup — base operacional</span></div>
  <div class="r"><span class="tag">xs · 12</span><span class="s" style="font-size:12px;font-weight:500;color:var(--text-muted)">Copiado há 2 dias</span></div>
  <div class="r"><span class="tag">2xs · 11</span><span class="s" style="font-size:11px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--text-muted)">Itens globais</span></div>
</body>
</html>
