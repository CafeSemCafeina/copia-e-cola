<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-canvas); font-family: var(--font-ui); }
  .wrap { max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
  .frame { background: var(--surface-card); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { ClipboardItem, DomainHeader } = window.CopiaEColaDesignSystem_b68b1c;
  function Demo() {
    const [copied, setCopied] = React.useState(null);
    const [fav, setFav] = React.useState(true);
    const copy = (id) => { setCopied(id); setTimeout(()=>setCopied(null), 1400); };
    return (
      <div className="wrap">
        <div className="frame">
          <DomainHeader domain="web.whatsapp.com" count={14} onSettings={()=>{}} />
          <div className="list">
            <ClipboardItem title="Saudação inicial" scope="domain"
              content="Olá! Tudo bem? Sou da equipe e já vou te ajudar por aqui. Pode me contar o que você precisa?"
              meta="Copiado há 2 dias" favorite={fav} onToggleFavorite={()=>setFav(!fav)}
              copied={copied==='a'} onCopy={()=>copy('a')} />
            <ClipboardItem title="Pedido de protocolo" scope="global"
              content="Por gentileza, me informe o número de protocolo para que eu localize seu atendimento."
              meta="Copiado há 1 semana" copied={copied==='b'} onCopy={()=>copy('b')} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
