<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 14px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Textarea, SearchInput } = window.CopiaEColaDesignSystem_b68b1c;
  function Demo() {
    const [t, setT] = React.useState('Saudação inicial');
    const [c, setC] = React.useState('Olá! Tudo bem? Sou da equipe e vou te ajudar por aqui.');
    const [q, setQ] = React.useState('protocolo');
    return (
      <div className="grid">
        <div className="col">
          <SearchInput value={q} onChange={e=>setQ(e.target.value)} onClear={()=>setQ('')} />
          <Input label="Título (opcional)" value={t} onChange={e=>setT(e.target.value)} placeholder="Dê um nome ao item" />
          <Input label="Domínio" mono value="web.whatsapp.com" hint="Contexto atual detectado" readOnly />
        </div>
        <div className="col">
          <Textarea label="Conteúdo" value={c} onChange={e=>setC(e.target.value)} rows={4} hint="O texto que será copiado" />
          <Input label="Título" invalid value="" placeholder="Obrigatório" hint="Informe um título" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
