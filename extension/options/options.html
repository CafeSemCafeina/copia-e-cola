<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Copia e Cola - opções</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="options-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"><span></span><strong></strong></div>
          <div>
            <p class="eyebrow">Copia e Cola</p>
            <h1>Itens salvos</h1>
          </div>
        </div>
        <dl class="stats">
          <div><dt>Total</dt><dd id="stat-total">0</dd></div>
          <div><dt>Sites</dt><dd id="stat-sites">0</dd></div>
          <div><dt>Globais</dt><dd id="stat-global">0</dd></div>
          <div><dt>Fixados</dt><dd id="stat-fixed">0</dd></div>
        </dl>
        <div class="backup-actions">
          <button id="export-button" class="button button--secondary" type="button">Exportar</button>
          <label class="button button--secondary file-button">
            Importar
            <input id="import-input" type="file" accept="application/json,.json">
          </label>
        </div>
        <p id="status-message" class="status-message" role="status"></p>
      </aside>

      <section class="workspace">
        <header class="workspace-header">
          <div>
            <p class="eyebrow">Gerenciamento local</p>
            <h2>Buscar em todos os itens</h2>
          </div>
          <label class="search-field">
            <span class="sr-only">Buscar em todos os itens</span>
            <input id="search-input" type="search" placeholder="Buscar em todos os itens">
          </label>
        </header>

        <form id="edit-form" class="edit-form" hidden>
          <input id="editing-id" type="hidden">
          <label>
            <span>Título</span>
            <input id="title-input" type="text" maxlength="80">
          </label>
          <label>
            <span>Conteúdo</span>
            <textarea id="content-input" rows="4" maxlength="8000" required></textarea>
          </label>
          <label class="checkbox-row">
            <input id="global-input" type="checkbox">
            <span>Item global</span>
          </label>
          <div class="form-actions">
            <button class="button button--primary" type="submit">Salvar alterações</button>
            <button id="cancel-edit-button" class="button button--ghost" type="button">Cancelar</button>
          </div>
        </form>

        <nav id="filter-list" class="filters" aria-label="Filtros"></nav>
        <div id="groups" class="groups"></div>
      </section>
    </main>

    <template id="filter-template">
      <button class="filter" type="button"></button>
    </template>

    <template id="item-template">
      <article class="item-card">
        <div>
          <h3></h3>
          <p class="item-card__content"></p>
          <p class="item-card__meta"></p>
        </div>
        <div class="item-card__actions">
          <button class="small-button copy-action" type="button">Copiar</button>
          <button class="small-button favorite-action" type="button">Fixar</button>
          <button class="small-button edit-action" type="button">Editar</button>
          <button class="small-button delete-action" type="button">Excluir</button>
        </div>
      </article>
    </template>

    <script src="../lib/storage.js"></script>
    <script src="../lib/backup.js"></script>
    <script src="options.js"></script>
  </body>
</html>
